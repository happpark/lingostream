<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Thumbnail Viewer</title>
  <link href='./style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>YouTube Thumbnail Viewer</h1>
    <p>Enter a YouTube link below to see its thumbnail.</p>
    <div class="input-group">
      <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." />
      <button id="get-thumbnail">Get Thumbnail</button>
    </div>
    <div id="thumbnail-container" class="thumbnail-container">
      <p class="placeholder-text">Thumbnail will appear here.</p>
    </div>
  </div>
  <script defer type="text/javascript" src="./main.js"></script>
</body>
</html>
